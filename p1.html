<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Motchii Matcha</title>
    <link rel="stylesheet" href="p1.css">
</head>
<body>

    <header>
        <nav>
            <a href="p1.html">الرئيسية</a>
            <a href="p2.html">المنتجات</a>
            <a href="p3.html">طريقة التحضير</a>
            <a href="p4.html">فوائد الماتشا</a>
            <a href="p5.html">معرض الماتشا</a>
        </nav>
    </header>

    <div style="text-align: center; margin-top: 20px;">
        <h1 style="color: #8E88A3; font-size: 40px; text-shadow: 2px 2px #C496A1;">Motchii matcha</h1>
    </div>

    <div class="main-container">
        <div class="img-container">
            <div class="img-box box-1">
                <video width="100%" height="100%" style="object-fit: cover;" autoplay loop muted playsinline>
                    <source src="v1.mp4" type="video/mp4">
                    متصفحك لا يدعم تشغيل الفيديو.
                </video>
            </div>
            <div class="img-box box-2">
                <img src="ph.jpg" alt="Matcha Image">
            </div>
        </div>

        <div class="login-card">
            <h2>تسجيل بيانات Motchii matcha</h2>
            <form id="userForm" action="p2.html">
                <div class="input-group">
                    <label for="name">الاسم بالكامل:</label>
                    <input type="text" id="name" required autofocus>
                </div>
                <div class="input-group">
                    <label for="email">البريد الإلكتروني:</label>
                    <input type="email" id="email" required>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="cta-button save-btn">حفظ والانتقال</button>
                    <button type="reset" class="cta-button delete-all-btn">حذف الكل</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
